<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Десна: РР3 Симулятор</title>
    <style>
        :root { --wood: #3e2723; --gold: #ffcc80; --dark: #0e1a14; --red: #d32f2f; }
        body { margin: 0; font-family: 'Arial', sans-serif; background: var(--dark); color: white; user-select: none; overflow: hidden; touch-action: none; }
        
        .stats { background: var(--wood); padding: 5px 10px; display: grid; grid-template-columns: 1fr 1fr; gap: 5px; border-bottom: 2px solid var(--gold); font-size: 0.8em; }
        .val { color: var(--gold); font-weight: bold; }
        
        /* Шкали */
        .bar-bg { background: #222; height: 8px; border-radius: 4px; margin: 3px 0; border: 1px solid #555; overflow: hidden; }
        #hunger-fill { height: 100%; background: #4caf50; width: 100%; transition: 0.2s; }
        #tension-fill { height: 100%; background: #ff9800; width: 0%; transition: 0.1s; }

        .screen { display: none; padding: 15px; text-align: center; height: 85vh; overflow-y: auto; }
        .active { display: block; }

        .btn { background: #5d4037; color: white; border: 2px solid var(--gold); padding: 12px; margin: 5px auto; width: 95%; border-radius: 5px; font-weight: bold; cursor: pointer; }
        
        /* ГРА */
        #game-view { height: 50vh; position: relative; background-size: cover; background-position: center; border-bottom: 3px solid var(--wood); }
        #rod { position: absolute; bottom: -10px; right: -20px; width: 250px; height: 6px; background: #1a1a1a; transform: rotate(-40deg); transform-origin: bottom right; z-index: 20; box-shadow: 0 0 5px black; }
        
        #bobber { position: absolute; display: none; z-index: 10; transform: translate(-50%, -100%); }
        .ant { width: 3px; height: 25px; background: red; margin: 0 auto; }
        .glow { background: #39ff14 !important; box-shadow: 0 0 10px #39ff14; }
        .bod { width: 12px; height: 16px; background: white; border-radius: 50%; border: 1px solid #000; margin-top: -8px; }

        /* Боротьба з рибою */
        #fight-ui { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 80%; background: rgba(0,0,0,0.8); padding: 15px; border: 2px solid var(--gold); display: none; z-index: 100; border-radius: 10px; }
        
        .bite-anim { animation: b-shake 0.2s infinite; }
        @keyframes b-shake { 0%, 100% { margin-top: -8px; } 50% { margin-top: 0px; } }
    </style>
</head>
<body>

<audio id="s-cast" src="https://actions.google.com/sounds/v1/water/splash.ogg"></audio>
<audio id="s-bite" src="https://www.soundjay.com/misc/sounds/bell-ringing-05.mp3"></audio> <audio id="s-pull" src="https://actions.google.com/sounds/v1/foley/fishing_reel_fast.ogg"></audio>
<audio id="s-break" src="https://www.soundjay.com/buttons/sounds/button-10.mp3"></audio>

<div class="stats">
    <div>💰 <span id="money" class="val">500</span>₴ | ⏰ <span id="game-time" class="val">12:00</span></div>
    <div>⭐ Р-д: <span id="rank" class="val">1</span> | 🧺 <span id="f-count" class="val">0</span></div>
    <div style="grid-column: span 2;">
        Голод: <div class="bar-bg"><div id="hunger-fill"></div></div>
    </div>
</div>

<div id="menu" class="screen active">
    <h1 style="color:var(--gold); text-shadow: 2px 2px #000;">ДЕСНА: РИБАЛКА</h1>
    <button class="btn" onclick="showScreen('locations')">🎣 ВИБРАТИ МІСЦЕ</button>
    <button class="btn" onclick="showScreen('shop')">🛒 МАГАЗИН СНАСТЕЙ</button>
    <button class="btn" onclick="showInventory()">🧺 САДОК</button>
    <button class="btn" onclick="sellFish()">⚖️ ПРОДАТИ РИБУ</button>
</div>

<div id="shop" class="screen">
    <h3>Рибальський магазин</h3>
    <div style="text-align: left; background: rgba(0,0,0,0.5); padding: 10px; border-radius: 10px;">
        <p>🥖 Хліб (+30 ситості) — <b>40₴</b> <button onclick="buy(1, 30, 40)">КУПИТИ</button></p>
        <p>🥓 Сало (+80 ситості) — <b>110₴</b> <button onclick="buy(1, 80, 110)">КУПИТИ</button></p>
        <hr>
        <p>🧵 Ліска 0.15 (до 2кг) — <b>300₴</b> <button onclick="buy(2, 2, 300)">КУПИТИ</button></p>
        <p>🧵 Ліска 0.30 (до 5кг) — <b>800₴</b> <button onclick="buy(2, 5, 800)">КУПИТИ</button></p>
        <p>🎣 Фідер "Десна-М" (до 15кг) — <b>2500₴</b> <button onclick="buy(2, 15, 2500)">КУПИТИ</button></p>
    </div>
    <button class="btn" onclick="showScreen('menu')">НАЗАД</button>
</div>

<div id="game" class="screen" style="padding:0;">
    <div id="game-view" onclick="handleTap(event)">
        <div id="rod"></div>
        <div id="bobber">
            <div id="ant" class="ant"></div>
            <div class="bod"></div>
        </div>
        
        <div id="fight-ui">
            <b style="color:orange">РИБА НА ГАЧКУ!</b>
            <div class="bar-bg" style="height:20px;"><div id="tension-fill"></div></div>
            <p style="font-size: 0.7em;">Швидко натискай ПУЛЬС, щоб витягнути!</p>
            <button class="btn" style="background:green" onclick="struggle()">ПУЛЬС ⚡</button>
        </div>
        
        <div id="g-status" style="padding:10px; font-weight:bold; text-shadow: 2px 2px black;"></div>
    </div>
    <button class="btn" onclick="backToMenu()">В МЕНЮ</button>
</div>

<div id="inventory" class="screen">
    <h3>Мій улов</h3>
    <div id="fish-list" style="text-align:left"></div>
    <button class="btn" onclick="showScreen('menu')">НАЗАД</button>
</div>

<script>
    let p = JSON.parse(localStorage.getItem('desna_final_save')) || { money: 500, xp: 0, rank: 1, inv: [], hr: 12, hng: 100, gear: 1.5 };
    let state = 'idle', timer, fishWeight = 0, tension = 0;

    function save() { localStorage.setItem('desna_final_save', JSON.stringify(p)); }

    setInterval(() => {
        p.hr = (p.hr + 1) % 24;
        p.hng = Math.max(0, p.hng - 1);
        updateUI();
    }, 10000);

    function updateUI() {
        document.getElementById('money').innerText = Math.floor(p.money);
        document.getElementById('rank').innerText = p.rank;
        document.getElementById('f-count').innerText = p.inv.length;
        document.getElementById('hunger-fill').style.width = p.hng + "%";
        document.getElementById('game-time').innerText = (p.hr < 10 ? '0' : '') + p.hr + ":00";
        document.getElementById('ant').className = (p.hr >= 21 || p.hr < 5) ? "ant glow" : "ant";
        save();
    }

    function showScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    function buy(type, val, cost) {
        if(p.money < cost) return alert("Недостатньо коштів!");
        p.money -= cost;
        if(type === 1) p.hng = Math.min(100, p.hng + val);
        else p.gear = val;
        updateUI();
        alert("Покупка успішна!");
    }

    function startFishing(img, name) {
        document.getElementById('game-view').style.backgroundImage = `url('${img}')`;
        showScreen('game');
        resetCast();
    }

    function handleTap(e) {
        if(state !== 'idle') return;
        if(p.hng < 10) return alert("Ти занадто голодний!");
        
        let rect = e.target.getBoundingClientRect();
        let x = e.clientX - rect.left;
        let y = e.clientY - rect.top;

        state = 'wait';
        let b = document.getElementById('bobber');
        b.style.left = x + "px"; b.style.top = y + "px";
        b.style.display = 'block';
        document.getElementById('s-cast').play();
        
        timer = setTimeout(triggerBite, 2000 + Math.random() * 4000);
    }

    function triggerBite() {
        state = 'bite';
        document.getElementById('bobber').classList.add('bite-anim');
        document.getElementById('s-bite').play();
        
        // Генеруємо вагу риби
        fishWeight = (Math.random() * (p.rank * 3) + 0.2).toFixed(2);
        
        timer = setTimeout(() => { if(state==='bite') { alert("Зірвалась!"); resetCast(); }}, 3000);
        
        // Показуємо UI боротьби при першому кліку на ТЯГНИ
        document.getElementById('fight-ui').style.display = 'block';
        tension = 0;
        updateTension();
    }

    function struggle() {
        if(state !== 'bite') return;
        tension += 15; // Сила кліку гравця
        document.getElementById('s-pull').play();
        
        if(tension >= 100) {
            catchFish();
        }
        
        // Риба тягне назад
        setTimeout(() => { tension = Math.max(0, tension - 5); updateTension(); }, 100);
    }

    function updateTension() {
        document.getElementById('tension-fill').style.width = tension + "%";
        // Перевірка на розрив ліски
        if(fishWeight > p.gear && tension > 70) {
            document.getElementById('s-break').play();
            alert("ОБРИВ! Риба занадто велика для твоєї снасті!");
            resetCast();
        }
    }

    function catchFish() {
        clearTimeout(timer);
        let fishArr = ["Карась", "Плітка", "Окунь", "Лящ", "Короп", "Щука", "Сом"];
        let f = fishArr[Math.floor(Math.random()*fishArr.length)];
        p.inv.push({n: f, w: parseFloat(fishWeight)});
        p.xp += 100; p.rank = Math.floor(p.xp/1000)+1;
        p.hng -= 5;
        alert(`Впіймав! ${f} на ${fishWeight} кг!`);
        resetCast();
        updateUI();
    }

    function resetCast() {
        state = 'idle';
        document.getElementById('bobber').style.display = 'none';
        document.getElementById('bobber').classList.remove('bite-anim');
        document.getElementById('fight-ui').style.display = 'none';
        clearTimeout(timer);
    }

    function sellFish() {
        if(!p.inv.length) return alert("Садок порожній!");
        let sum = p.inv.reduce((a, f) => a + (f.w * 120), 0);
        p.money += sum; p.inv = [];
        updateUI();
        alert(`Гроші отримано: ${Math.floor(sum)}₴`);
    }

    function showInventory() {
        let list = document.getElementById('fish-list');
        list.innerHTML = p.inv.length ? p.inv.map(f => `<div style="border-bottom:1px solid #333; padding:5px;">${f.n} - ${f.w}кг</div>`).join("") : "Пусто";
        showScreen('inventory');
    }

    function backToMenu() { resetCast(); showScreen('menu'); }

    updateUI();
</script>
</body>
</html>
