<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">

    <title>Десна</title>
    <style>
       :root{
--wood:#3e2723;
--gold:#ffcc80;
--dark:#0e1a14;
--neon:#39ff14;
--danger:#ff4444;
--glass: rgba(255,255,255,0.05);
--blur: blur(10px);
}
body{
margin:0;
font-family:'Montserrat',sans-serif;
background:#000;
color:white;
overflow:hidden;
user-select:none;
}     
.stats{
background:rgba(20,20,20,0.7);
backdrop-filter:blur(12px);
border-bottom:1px solid rgba(255,255,255,0.1);
padding:8px 10px;

display:grid;
grid-template-columns:1fr 1fr 1fr;
gap:6px;

font-size:0.75em;
text-align:center;
box-shadow:0 0 10px rgba(0,0,0,0.7);
}
.val{
color:var(--gold);
font-weight:bold;
text-shadow:0 0 5px rgba(255,204,128,0.7);
}
        
.bar-container{
grid-column:span 3;
display:flex;
gap:10px;
align-items:center;
margin-top:5px;
}

.bar-bg{
flex-grow:1;
background:#111;
height:10px;
border-radius:6px;
border:1px solid #333;
overflow:hidden;
}

#h-fill{
height:100%;
background:linear-gradient(90deg,#00ff87,#60efff);
transition:0.4s;
}

.screen{
display:none;
padding:10px;
text-align:center;
height:90vh;
overflow-y:auto;

background:rgba(0,0,0,0.45);
backdrop-filter:blur(6px);
box-sizing:border-box;
}
.item-row img:hover{
    transform: scale(1.2);
}
#menu {
    position: relative;
    background: url('Десна.jpg') center/cover no-repeat;
}

#menu::before {
    content: "";
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.45);
    pointer-events: none;
}

#menu * {
    position: relative;
    z-index: 2;
}
.active{
display:block !important;
}
.btn{
    background:linear-gradient(145deg,#5d4037,#2d1b17);
    color:#fff;

    border:1px solid rgba(255,204,128,0.5);

    padding:10px;
    margin:6px auto;
    width:95%;

    border-radius:10px;

    cursor:pointer;
    font-size:0.85em;
    font-weight:bold;
    text-transform:uppercase;

    transition:0.2s;

    box-shadow:
        0 3px 8px rgba(0,0,0,0.6),
        inset 0 0 6px rgba(255,255,255,0.05);
}

/* hover */
.btn:hover{
    background:linear-gradient(145deg,#6d4c41,#3e2723);
    border-color:#ffcc80;
    box-shadow:
        0 0 10px rgba(255,204,128,0.4),
        0 3px 10px rgba(0,0,0,0.7);
    transform:translateY(-1px);
}

/* натискання */
.btn:active{
    transform:translateY(2px);
    box-shadow:
        inset 0 3px 6px rgba(0,0,0,0.6);
}

/* маленькі кнопки */
.btn-small{
    background:#3e2723;
    color:#fff;
    border:1px solid #ffcc80;
    padding:5px 10px;
    margin:2px;
    cursor:pointer;
    border-radius:6px;
    transition:0.2s;
}

.btn-small:hover{
    background:#5d4037;
    box-shadow:0 0 6px rgba(255,204,128,0.5);
}

/* disabled */
.btn:disabled,
.btn-small:disabled{
    background:#222;
    color:#555;
    border-color:#333;
    box-shadow:none;
    cursor:not-allowed;
}

#game-view { height: 50vh; position: relative; background-size: cover; background-position: center; border-bottom: 3px solid var(--wood); overflow: hidden; background-color: #222; }
     
 #rod-visual{
    position:absolute;
    bottom:-60px;
    right:18%;
    width:147px;
    height:213px;
    background: url('rod.png') no-repeat center/contain;
    transform-origin: bottom center;
    transform: rotate(15deg);
    transition: transform 0.1s;
    z-index: 10;
    display: none;
    pointer-events: none;
}
        #bobber { position: absolute; display: none; z-index: 5; }
        .ant { width: 3px; height: 15px; background: red; margin: 0 auto; }
        .bod { width: 8px; height: 12px; background: white; border-radius: 50%; border: 1px solid black; }

        #fight-ui { position: absolute; top: 30%; left: 50%; transform: translate(-50%, -50%); width: 85%; background: rgba(0,0,0,0.85); padding: 12px; border: 2px solid var(--gold); display: none; z-index: 100; border-radius: 8px; }
        .f-bar { background: #111; height: 14px; border-radius: 7px; border: 1px solid #555; margin: 2px 0 8px 0; overflow: hidden; }
        
.tabs{
display:flex;
overflow-x:auto;
gap:4px;
margin-bottom:10px;
}

.tab{
flex:0 0 90px;
padding:8px;

background:rgba(30,30,30,0.7);
border:1px solid rgba(255,255,255,0.1);

font-size:0.7em;
cursor:pointer;

border-radius:6px;
transition:0.2s;
}

.tab.active-tab{
background:var(--wood);
color:var(--gold);
border-color:var(--gold);
box-shadow:0 0 8px rgba(255,204,128,0.6);
}

.item-row{
    display:flex;
    justify-content:space-between;
    align-items:center;

    background:rgba(0,0,0,0.25);
    border:1px solid rgba(255,255,255,0.08);
    border-radius:8px;

    padding:6px;
    margin:4px 0;
}

.item-row img{
    width:50px;
    height:50px;
    object-fit:contain;

    background:#111;
    border:1px solid #444;
    border-radius:6px;
    padding:3px;
}
.ach-unlocked{
opacity:1;
border-color:var(--gold);
box-shadow:0 0 12px rgba(255,204,128,0.6);
}
        
        .inv-section { margin-bottom: 15px; border: 1px solid #444; border-radius: 5px; padding: 5px; background: #222; }
        .inv-title { font-size: 0.7em; color: var(--gold); text-transform: uppercase; margin-bottom: 5px; border-bottom: 1px solid #444; display: block; }
#day-overlay{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
pointer-events:none;
transition: background 1s linear;
}
#game-popup {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) scale(0.8);
    background: #2d1b17;
    border: 2px solid #ffcc80;
    padding: 20px 25px;
    z-index: 999;
    display: none;
    text-align: center;
    border-radius: 10px;
    box-shadow: 0 0 20px black;
    color: white;
    max-width: 300px;
    transition: all 0.3s ease;
    opacity: 0;
}

#game-popup.show {
    display: block;
    opacity: 1;
    transform: translate(-50%, -50%) scale(1);
}

#game-popup button {
    margin-top: 15px;
    padding: 8px 20px;
    background: #4e342e;
    border: 1px solid #ffcc80;
    color: white;
    cursor: pointer;
    border-radius: 5px;
    font-weight: bold;
    transition: 0.2s;
}

#game-popup button:hover {
    background: #673c31;
}

#water{
position:absolute;
bottom:0;
left:0;
width:100%;
height:45%;   /* висота води */
background:rgba(0,80,150,0.15);
border-top: none;
}
#xp-fill {
    height: 100%;
    background: linear-gradient(90deg, #00c6ff, #0072ff);
    width: 0%;
    transition: 0.3s;
}
    </style>
</head>

            onmousedown="startPull()"

        </div>
    </div>

</div>

        progress += pull * 2 * fishSpeed;

    if(document.getElementById('game-popup').classList.contains('show')) return;

    if(state !== 'idle') return;

    let rect = e.currentTarget.getBoundingClientRect();
    let y = e.clientY - rect.top;

    let waterStart = rect.height * 0.55; // де починається вода

    if(y < waterStart){
        showPopup("🎣 Далеко не закину!");
        return;
    }

    if(p.hng < 5)

    state = 'wait';
    p.baits[p.selBait]--;

    document.getElementById('s-cast').play();
    
    document.getElementById('bobber').style.left = (e.clientX - rect.left) + "px";
    document.getElementById('bobber').style.top = (e.clientY - rect.top) + "px";
    document.getElementById('bobber').style.display = 'block';
    document.getElementById('rod-visual').style.display = 'block';

    setTimeout(() => {

        if(state === 'wait'){

            state = 'bite';
            document.getElementById('s-bite').play();

            let bData = GEAR_DATA.baits.find(x => x.n === p.selBait);
            fishW = +(Math.random() * (bData.size[1] - bData.size[0]) + bData.size[0]).toFixed(2);

            document.getElementById('fight-ui').style.display = 'block';
        }

    }, 2000 + Math.random() * 3000);

    } else {
        document.getElementById('t-fill').style.background = "red";
    }

    let rod = document.getElementById('rod-visual');
    let angle = 15 - tension/3;

    let shake = (Math.random() - 0.5) * 4;
    let bend = tension / 20;

    rod.style.transform =
        `rotate(${angle + shake}deg) skewX(${-bend}deg) scaleY(${1 + tension/300})`;

    if(tension > 75){
        rod.style.filter = "brightness(1.4)";
    } else {
        rod.style.filter = "brightness(1)";
    }

    // Покращена функція вибору риби (враховує час доби та наживку)
function catchFish() {
    const bData = GEAR_DATA.baits.find(x => x.n === p.selBait);
    const hour = p.hr;
    const isNight = (hour >= 21 || hour < 5);
    
    // Фільтруємо риб, які люблять цю наживку
    let possibleFish = GEAR_DATA.fish.filter(f => bData.target.includes(f.n));
    
    // Якщо ніч, додаємо шанс на Сома, якщо день - на Плітку тощо (можна розширити)
    let fishData = possibleFish[Math.floor(Math.random() * possibleFish.length)];

    // Вага залежить від наживки та можливостей риби
    let weight = +(Math.random() * (fishData.max - fishData.min) + fishData.min).toFixed(2);
    
    // Обмежуємо максимальну вагу можливостями наживки (щоб на хліб не клюнув сом 40кг)
    if (weight > bData.size[1]) weight = bData.size[1];

    p.inv.push({
    n: fishData.n,
    w: weight,
    img: fishData.img
});
    p.stats.totalF++;
    if(weight > p.stats.maxW) p.stats.maxW = weight;

    let xpGain = Math.floor(weight * 15 + p.rank * 10);
    addXP(xpGain);

    showPopup(`
    <div style="text-align:center">
        <img src="${fishData.img}" style="width:160px"><br>
        <b>🐟 ${fishData.n}</b><br>
        Вага: ${weight} кг<br>
        +${xpGain} XP
    </div>
`);
    resetGame();
    p.daily.quests.forEach(q=>{

    if(q.type === "fish"){
        q.progress++;
    }

    if(q.type === "big" && weight >= 2){
        q.progress++;
    }

    if(q.progress >= q.target){
        q.done = true;
    }

});
}

    while(p.xp >= getRequiredXP(p.rank)){
        p.xp -= getRequiredXP(p.rank);
        p.rank++;

        showPopup("⭐ Новий розряд: " + p.rank);
    }

    updateUI();
}

    );

    function updateDayNight(){

let overlay = document.getElementById("day-overlay");

let h = p.hr;

if(h >= 6 && h < 18){

overlay.style.background = "rgba(0,0,0,0)";

}
else if(h >= 18 && h < 21){

overlay.style.background = "rgba(0,0,40,0.3)";

}
else if(h >= 21 || h < 5){

overlay.style.background = "rgba(0,0,80,0.55)";

}
else{

overlay.style.background = "rgba(0,0,30,0.2)";

}

}
function showPopup(text) {
    const popup = document.getElementById('game-popup');
    const popupText = document.getElementById('popup-text');

    popup.style.display = 'block';
    popupText.innerHTML = text;
    popup.classList.add('show');
}
function closePopup() {
    const popup = document.getElementById('game-popup');

    popup.classList.remove('show');  // прибирає анімацію

    setTimeout(() => {
        popup.style.display = 'none';  // повністю ховає
    }, 300);
}
   function resetGame() {
    state = 'idle';
    pullActive = false;
    tension = 0;
    progress = 0;

    document.getElementById('fight-ui').style.display = 'none';
    document.getElementById('bobber').style.display = 'none';
    document.getElementById('rod-visual').style.display = 'none';
}
    
  function renderAchs(){

    const container = document.getElementById('ach-container');
    if(!container || !Array.isArray(ACHS)) return;

    const unlocked = p?.unlockedAchs || [];

    container.innerHTML = ACHS.map(a => `
        <div class="ach-card ${unlocked.includes(a.id) ? 'ach-unlocked' : ''}">
            <b>${a.n}</b><br>
            ${a.d}<br>
            💰 Нагорода: ${a.r}₴
        </div>
    `).join('');
}
    function checkAchs(){

ACHS.forEach(a=>{

if(!p.unlockedAchs.includes(a.id) && a.c(p)){

p.unlockedAchs.push(a.id);

p.money += a.r;

if(a.xp){
    addXP(a.xp);
}

showPopup(
"🏆 ДОСЯГНЕННЯ: " + a.n +
"\n+" + a.r + "₴" +
(a.xp ? "\n+" + a.xp + " XP" : "")
);

updateUI();

}

});

}
    function renderLocs() {
    document.getElementById('loc-list').innerHTML =
    LOCATIONS.map((l, i) =>
        `<button class="btn"
            onclick="p.rank>=${l.rank}?goToLoc(${i}):null"
            ${p.rank<l.rank?'disabled':''}>
            ${l.n} (потрібен р-д ${l.rank})
        </button>`
    ).join('');
}
    function goToLoc(i) { document.getElementById('game-view').style.backgroundImage = `url('${LOCATIONS[i].img}')`; showScreen('game'); resetGame(); p.daily.quests.forEach(q=>{

    if(q.type === "sell"){
        q.progress = 1;

    }

    if(q.type === "earn"){
        q.progress = Math.floor(p.dailyEarned);

    }

    if(q.progress >= q.target){
        q.done = true;
    }

}); }
   function sellFish() {

    document.getElementById('my-sound').play();

    let sum = Math.floor(p.inv.reduce((a, f) => a + (f.w * 130), 0));

    p.money += sum;
    p.inv = [];

    p.dailyEarned += sum;

    // прогрес квестів
    p.daily.quests.forEach(q => {

        if(q.type === "sell"){
            q.progress = 1;
        }

        if(q.type === "earn"){
            q.progress = Math.floor(p.dailyEarned);
        }

        if(q.progress >= q.target){
            q.done = true;
        }
       if(q.type === "loc"){
        q.progress++;
    }
    if(q.progress >= q.target){
        q.done = true;
    }

    });

    showPopup(`💰 Продано улов на ${sum}₴`);

    renderInv();
    updateUI();
}
function renderInv(){

    let html = p.inv.map((f) => {

        return `
        <div style="
            width:140px;
            text-align:center;
            background:#0002;
            border-radius:10px;
            padding:5px;
        ">
            <img src="${f.img}" style="
                width:120px;
                height:80px;
                object-fit:contain;
            ">
            <div><b>${f.n}</b></div>
            <div>${f.w} кг</div>
        </div>
        `;
    }).join('');

    document.getElementById('fish-list').innerHTML =
        `<div style="display:flex; flex-wrap:wrap; gap:10px;">${html}</div>`;
}
    function exitGame() { resetGame(); showScreen('menu'); }
