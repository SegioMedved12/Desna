<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Десна: РР3 Pro Edition</title>
    <style>
        :root { --wood: #3e2723; --gold: #ffcc80; --dark: #0e1a14; --neon: #39ff14; }
        body { margin: 0; font-family: 'Tahoma', sans-serif; background: var(--dark); color: white; user-select: none; overflow: hidden; touch-action: none; }
        
        /* Панель стану */
        .stats { background: var(--wood); padding: 5px 10px; display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 5px; border-bottom: 2px solid var(--gold); font-size: 0.75em; text-align: center; }
        .val { color: var(--gold); font-weight: bold; }
        .bar-bg { background: #111; height: 8px; border-radius: 4px; border: 1px solid #555; margin-top: 2px; }
        #h-fill { height: 100%; background: #4caf50; width: 100%; transition: 0.5s; }

        .screen { display: none; padding: 10px; text-align: center; height: 88vh; overflow-y: auto; background: #1a1a1a; }
        .active { display: block; }

        .btn { background: #4e342e; color: white; border: 1.5px solid var(--gold); padding: 10px; margin: 4px auto; width: 95%; border-radius: 4px; cursor: pointer; font-size: 0.9em; }
        .btn:active { background: #2b1d1a; }

        /* ГЕЙМПЛЕЙ */
        #game-view { height: 45vh; position: relative; background-size: cover; background-position: center; border-bottom: 3px solid var(--wood); cursor: crosshair; }
        #rod-tip { position: absolute; bottom: 0; right: 0; width: 200px; height: 150px; background: url('https://i.imgur.com/your-rod-png.png'); background-size: contain; pointer-events: none; z-index: 20; }
        
        #bobber { position: absolute; display: none; z-index: 10; transform: translate(-50%, -100%); }
        .ant { width: 3px; height: 20px; background: red; margin: 0 auto; }
        .bod { width: 10px; height: 14px; background: white; border-radius: 50%; border: 1px solid black; }

        #fight-ui { position: absolute; top: 30%; left: 50%; transform: translateX(-50%); width: 70%; background: rgba(0,0,0,0.9); padding: 10px; border: 2px solid red; display: none; z-index: 100; border-radius: 8px; }
        
        .shop-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; text-align: left; font-size: 0.8em; }
        .item { background: #2d1b17; padding: 8px; border: 1px solid #5d4037; border-radius: 4px; }
        
        .ach-list { text-align: left; font-size: 0.8em; }
        .ach-item { padding: 5px; border-bottom: 1px solid #333; color: #888; }
        .ach-done { color: var(--gold); }
    </style>
</head>
<body>

<audio id="s-cast" src="https://actions.google.com/sounds/v1/water/splash.ogg"></audio>
<audio id="s-bite" src="https://www.soundjay.com/misc/sounds/bell-ringing-05.mp3"></audio>
<audio id="s-catch" src="https://actions.google.com/sounds/v1/foley/fishing_reel_fast.ogg"></audio>
<audio id="s-drink" src="https://www.soundjay.com/drink-water-1.mp3"></audio>

<div class="stats">
    <div>💰 <span id="money" class="val">500</span></div>
    <div>⭐ Р-д: <span id="rank" class="val">1</span></div>
    <div>⏰ <span id="time" class="val">12:00</span></div>
    <div style="grid-column: span 3;">
        <div class="bar-bg"><div id="h-fill"></div></div>
    </div>
</div>

<div id="menu" class="screen active">
    <h2 style="color:var(--gold); margin:5px;">ДЕСНА: РР3 PRO</h2>
    <button class="btn" onclick="showScreen('locs')">➡️ НА РИБОЛОВЛЮ</button>
    <button class="btn" onclick="showScreen('shop')">🛒 МАГАЗИН СНАСТЕЙ</button>
    <button class="btn" onclick="showInventory()">🧺 САДОК</button>
    <button class="btn" onclick="showScreen('ach')">🏆 ДОСЯГНЕННЯ</button>
    <button class="btn" style="background:#222; font-size:0.7em;" onclick="downloadGame()">📥 СКАЧАТИ ГРУ (.html)</button>
</div>

<div id="shop" class="screen">
    <h3 style="margin:5px">МАГАЗИН</h3>
    <div class="shop-grid">
        <div class="item"><b>СНАСТІ</b><br>🧵 Ліска 5кг - 400₴<button onclick="buy('gear', 5, 400)">Купити</button></div>
        <div class="item"><b>СНАСТІ</b><br>🎣 Фідер 20кг - 2000₴<button onclick="buy('gear', 20, 2000)">Купити</button></div>
        <div class="item"><b>ЇЖА</b><br>🥖 Хліб (+20) - 30₴<button onclick="buy('food', 20, 30)">Купити</button></div>
        <div class="item"><b>БАР</b><br>🍺 Пиво (+EXP) - 60₴<button onclick="buy('alc', 10, 60)">Купити</button></div>
        <div class="item"><b>БАР</b><br>🥃 Горілка (+EXP) - 150₴<button onclick="buy('alc', 30, 150)">Купити</button></div>
    </div>
    <button class="btn" onclick="showScreen('menu')">НАЗАД</button>
</div>

<div id="locs" class="screen">
    <h3>Оберіть місце:</h3>
    <button class="btn" onclick="go('butka.jpg')">Біля бутки</button>
    <button class="btn" onclick="go('topolki.jpg')">Топольки</button>
    <button class="btn" onclick="go('parom.jpg')">Біля парома</button>
    <button class="btn" onclick="go('popopve.jpg')">Попове</button>
    <button class="btn" onclick="go('sohatske.jpg')">Сохатське</button>
    <button class="btn" onclick="showScreen('menu')">НАЗАД</button>
</div>

<div id="game" class="screen" style="padding:0;">
    <div id="game-view" onclick="tapWater(event)">
        <div id="bobber"><div class="ant"></div><div class="bod"></div></div>
        <div id="fight-ui">
            <div class="bar-bg" style="height:15px;"><div id="t-fill" style="width:0; background:orange; height:100%;"></div></div>
            <button class="btn" style="background:green" onclick="pull()">ТЯГНИ! ⚡</button>
        </div>
        <div id="g-msg" style="padding:10px; font-weight:bold; text-shadow:2px 2px #000;"></div>
    </div>
    <button class="btn" onclick="exitGame()">В ГОЛОВНЕ МЕНЮ</button>
</div>

<div id="ach" class="screen">
    <h3>ДОСЯГНЕННЯ</h3>
    <div id="ach-list" class="ach-list"></div>
    <button class="btn" onclick="showScreen('menu')">НАЗАД</button>
</div>

<script>
    let p = JSON.parse(localStorage.getItem('desna_pro_v1')) || { 
        money: 500, xp: 0, rank: 1, inv: [], hr: 12, hng: 100, gear: 2, 
        days: 1, maxW: 0, totalF: 0, achs: [] 
    };
    let state = 'idle', timer, fW = 0, tension = 0;

    function save() { localStorage.setItem('desna_pro_v1', JSON.stringify(p)); checkAchs(); }

    // Ігровий цикл (час, голод)
    setInterval(() => {
        p.hr = (p.hr + 1) % 24;
        if(p.hr == 0) p.days++;
        p.hng = Math.max(0, p.hng - 1.5);
        updateUI();
    }, 8000);

    function updateUI() {
        document.getElementById('money').innerText = Math.floor(p.money);
        document.getElementById('rank').innerText = p.rank;
        document.getElementById('time').innerText = (p.hr < 10 ? '0' : '') + p.hr + ":00";
        document.getElementById('h-fill').style.width = p.hng + "%";
        save();
    }

    function showScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    function buy(type, val, cost) {
        if(p.money < cost) return alert("Мало грошей!");
        p.money -= cost;
        if(type === 'food') p.hng = Math.min(100, p.hng + val);
        if(type === 'gear') p.gear = val;
        if(type === 'alc') { p.xp += val * 10; p.hng -= 10; document.getElementById('s-drink').play(); }
        updateUI();
    }

    function go(img) {
        document.getElementById('game-view').style.backgroundImage = `url('${img}')`;
        showScreen('game');
        reset();
    }

    function tapWater(e) {
        if(state !== 'idle') return;
        if(p.hng < 15) return alert("Ти виснажений! Поїж.");

        let rect = e.target.getBoundingClientRect();
        let y = e.clientY - rect.top;
        
        // ПЕРЕВІРКА: НЕБО ЧИ ВОДА? (приблизно 45% зверху - небо)
        if(y < rect.height * 0.45) {
            document.getElementById('g-msg').innerText = "Тут занадто мілко або небо!";
            return;
        }

        let x = e.clientX - rect.left;
        let b = document.getElementById('bobber');
        b.style.left = x + "px"; b.style.top = y + "px";
        b.style.display = 'block';
        document.getElementById('s-cast').play();
        document.getElementById('g-msg').innerText = "Чекаємо покльовку...";
        
        state = 'wait';
        timer = setTimeout(bite, 2000 + Math.random() * 5000);
    }

    function bite() {
        state = 'bite';
        document.getElementById('s-bite').play();
        document.getElementById('fight-ui').style.display = 'block';
        fW = (Math.random() * (p.rank * 4) + 0.1).toFixed(2);
        tension = 0;
    }

    function pull() {
        if(state !== 'bite') return;
        tension += 20;
        document.getElementById('s-catch').play();
        document.getElementById('t-fill').style.width = tension + "%";
        
        if(fW > p.gear && tension > 60) {
            alert("ОБРИВ! Снасть не витримала!");
            reset(); return;
        }
        if(tension >= 100) finishCatch();
    }

    function finishCatch() {
        let fishArr = ["Карась", "Плітка", "Окунь", "Лящ", "Короп", "Щука", "Сом"];
        let f = fishArr[Math.floor(Math.random()*fishArr.length)];
        p.inv.push({n: f, w: parseFloat(fW)});
        p.xp += 100; p.rank = Math.floor(p.xp/1000)+1;
        p.totalF++;
        if(fW > p.maxW) p.maxW = fW;
        alert(`🏆 ${f} (${fW} кг)!`);
        reset();
        updateUI();
    }

    function reset() {
        state = 'idle';
        document.getElementById('bobber').style.display = 'none';
        document.getElementById('fight-ui').style.display = 'none';
        document.getElementById('t-fill').style.width = '0%';
        clearTimeout(timer);
    }

    function checkAchs() {
        let a = [];
        if(p.rank >= 5) a.push("Досвідчений (5 розряд)");
        if(p.days >= 7) a.push("Тиждень на Десні");
        if(p.maxW >= 5) a.push("Мисливець на гігантів (риба >5кг)");
        if(p.totalF >= 50) a.push("Рибалка-стахановець (50 риб)");
        p.achs = a;
        let list = document.getElementById('ach-list');
        list.innerHTML = a.map(it => `<div class="ach-item ach-done">✅ ${it}</div>`).join("");
    }

    function sellFish() {
        let sum = p.inv.reduce((a, f) => a + (f.w * 130), 0);
        p.money += sum; p.inv = []; updateUI();
        alert("Продано на " + Math.floor(sum) + "₴");
    }

    function showInventory() {
        let list = document.getElementById('ach-list'); // Використаємо той же контейнер
        showScreen('ach');
        document.querySelector('#ach h3').innerText = "САДОК";
        list.innerHTML = p.inv.length ? p.inv.map(f => `<div>${f.n} - ${f.w}кг</div>`).join("") : "Порожньо";
    }

    function downloadGame() {
        const html = document.documentElement.outerHTML;
        const blob = new Blob([html], {type: 'text/html'});
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = 'Desna_Fishing_Pro.html';
        a.click();
    }

    function exitGame() { reset(); showScreen('menu'); }
    updateUI();
</script>
</body>
</html>
