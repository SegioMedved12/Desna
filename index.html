<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Десна: РР3 Ultimate Gold Edition</title>
    <style>
        :root { --wood: #3e2723; --gold: #ffcc80; --dark: #0e1a14; --neon: #39ff14; }
        body { margin: 0; font-family: 'Tahoma', sans-serif; background: var(--dark); color: white; user-select: none; overflow: hidden; touch-action: none; }
        
        /* Статистика */
        .stats { background: var(--wood); padding: 5px 10px; display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 5px; border-bottom: 2px solid var(--gold); font-size: 0.8em; text-align: center; z-index: 100; position: relative; }
        .val { color: var(--gold); font-weight: bold; }

        /* Екрани */
        .screen { display: none; padding: 10px; text-align: center; height: 92vh; overflow-y: auto; background: #1a1a1a; box-sizing: border-box; }
        .active { display: block !important; }

        /* Кнопки */
        .btn { background: #4e342e; color: white; border: 1.5px solid var(--gold); padding: 12px; margin: 5px auto; width: 95%; border-radius: 4px; cursor: pointer; font-size: 0.9em; font-weight: bold; text-transform: uppercase; transition: 0.2s; }
        .btn:active { background: var(--gold); color: #3e2723; }
        .btn-small { width: auto; padding: 6px 12px; font-size: 0.75em; background: #5d4037; border: 1px solid var(--gold); color: white; cursor: pointer; }
        .btn-small:disabled { opacity: 0.5; background: #222; }

        /* Візуалізація лову */
        #game-view { height: 55vh; position: relative; background-size: cover; background-position: center; border-bottom: 3px solid var(--wood); overflow: hidden; background-color: #222; }
        
        /* Вудка */
        #rod-container { position: absolute; bottom: -10px; right: 15%; width: 100px; height: 220px; z-index: 10; display: none; pointer-events: none; transform-origin: bottom center; }
        .rod-body { position: absolute; bottom: 0; right: 50%; width: 7px; height: 200px; background: linear-gradient(to right, #1a1a1a, #444, #1a1a1a); clip-path: polygon(40% 0%, 60% 0%, 100% 100%, 0% 100%); border-radius: 2px; }
        .rod-reel { position: absolute; bottom: 40px; right: 35%; width: 18px; height: 18px; background: #777; border-radius: 50%; border: 2px solid #333; box-shadow: inset 0 0 5px #000; }
        
        /* Ліска */
        #fishing-line { position: absolute; background: rgba(255,255,255,0.8); height: 1px; width: 0; transform-origin: top left; z-index: 9; pointer-events: none; box-shadow: 0 0 2px white; }

        /* Поплавок */
        #bobber { position: absolute; display: none; z-index: 5; transition: top 0.1s; }
        .ant { width: 3px; height: 15px; background: #ff0000; margin: 0 auto; border: 0.5px solid black; }
        .bod { width: 10px; height: 14px; background: white; border-radius: 50% 50% 40% 40%; border: 1px solid black; }

        /* Інтерфейс боротьби */
        #fight-ui { position: absolute; top: 25%; left: 50%; transform: translate(-50%, -50%); width: 80%; background: rgba(0,0,0,0.85); padding: 15px; border: 2px solid var(--gold); display: none; z-index: 100; border-radius: 10px; }
        .f-bar { background: #000; height: 16px; border-radius: 8px; border: 1px solid #555; margin: 10px 0; overflow: hidden; }
        #t-fill { height: 100%; transition: 0.1s; }
        #p-fill { height: 100%; background: #2196f3; transition: 0.1s; }

        .item-row { display: flex; justify-content: space-between; align-items: center; padding: 10px; border-bottom: 1px solid #333; font-size: 0.9em; background: rgba(255,255,255,0.05); margin-bottom: 2px; }
        .inv-section { margin-bottom: 15px; border: 1px solid #444; background: #222; text-align: left; }
        .section-header { background: #333; padding: 5px 10px; font-size: 0.8em; color: var(--gold); font-weight: bold; }
    </style>
</head>
<body>

<audio id="bg-music" loop src="https://assets.mixkit.co/music/preview/mixkit-forest-ambiance-1215.mp3"></audio>
<audio id="s-cast" src="https://actions.google.com/sounds/v1/water/splash.ogg"></audio>
<audio id="s-bite" src="https://www.soundjay.com/misc/sounds/bell-ringing-05.mp3"></audio>
<audio id="s-reel" loop src="https://actions.google.com/sounds/v1/foley/fishing_reel_fast.ogg"></audio>
<audio id="s-click" src="https://www.soundjay.com/buttons/sounds/button-16.mp3"></audio>
<audio id="s-money" src="https://www.soundjay.com/clutter/sounds/coins-clinking-1.mp3"></audio>
<audio id="s-success" src="https://actions.google.com/sounds/v1/cartoon/success_jingle.ogg"></audio>

<div class="stats">
    <div>💰 <span id="money">500</span>₴</div>
    <div>⭐ Р-д: <span id="rank">1</span></div>
    <div>⏰ <span id="time">12:00</span></div>
</div>

<div id="menu" class="screen active">
    <h1 style="color:var(--gold); text-shadow: 2px 2px #000;">ДЕСНА: РР3 GOLD</h1>
    <div style="margin: 10px auto; width: 90%; background: #000; padding: 10px; border: 1px solid var(--gold); color: var(--neon); font-size: 0.9em;">
        🎣 Наживка: <span id="cur-bait-name">...</span> (<span id="cur-bait-count">0</span> шт)
    </div>
    <button class="btn" onclick="showScreen('locs')">➡️ НА ВОДУ</button>
    <button class="btn" onclick="showScreen('backpack')">🎒 РЮКЗАК</button>
    <button class="btn" onclick="showScreen('shop')">🛒 МАГАЗИН</button>
    <button class="btn" onclick="showScreen('inv')">🧺 САДОК</button>
    <button class="btn" onclick="sellFish()" style="background:#1b5e20; margin-top: 15px;">⚖️ ПРОДАТИ УЛОВ</button>
</div>

<div id="backpack" class="screen">
    <h2 style="color:var(--gold)">🎒 ТВІЙ РЮКЗАК</h2>
    <div class="inv-section">
        <div class="section-header">ВИБІР НАЖИВКИ</div>
        <div id="inv-baits"></div>
    </div>
    <div class="inv-section">
        <div class="section-header">ПРОДУКТИ</div>
        <div id="inv-food"></div>
    </div>
    <button class="btn" onclick="showScreen('menu')">НАЗАД</button>
</div>

<div id="shop" class="screen">
    <h2 style="color:var(--gold)">🛒 МАГАЗИН</h2>
    <div id="shop-items"></div>
    <button class="btn" onclick="showScreen('menu')">НАЗАД</button>
</div>

<div id="locs" class="screen">
    <h2 style="color:var(--gold)">ВИБЕРІТЬ МІСЦЕ</h2>
    <div id="loc-list">
        <button class="btn" onclick="showScreen('game')">📍 Біля бутки (Десна)</button>
    </div>
    <button class="btn" onclick="showScreen('menu')">НАЗАД</button>
</div>

<div id="game" class="screen" style="padding:0;">
    <div id="game-view" onclick="cast(event)">
        <div id="fishing-line"></div>
        <div id="rod-container">
            <div class="rod-body"></div>
            <div class="rod-reel"></div>
        </div>
        <div id="bobber"><div class="ant"></div><div class="bod"></div></div>
        
        <div id="fight-ui">
            <b style="color:var(--neon); font-size: 1.2em;">КЛЮЄ! ТЯГНИ! 🎣</b>
            <div class="f-bar"><div id="t-fill" style="width:0; background:red;"></div></div>
            <div class="f-bar"><div id="p-fill" style="width:0;"></div></div>
            <button class="btn" style="background:green" onmousedown="startPull()" onmouseup="stopPull()" ontouchstart="startPull()" ontouchend="stopPull()">ТЯГНИ</button>
        </div>
    </div>
    <button class="btn" onclick="exitGame()">В МЕНЮ (ЗМОТАТИ)</button>
</div>

<div id="inv" class="screen">
    <h2 style="color:var(--gold)">🧺 ТВІЙ САДОК</h2>
    <div id="fish-list" style="text-align: left;"></div>
    <button class="btn" onclick="showScreen('menu')">НАЗАД</button>
</div>

<script>
    const GEAR_DATA = {
        baits: [
            {n: "Черв'як", p: 50, target: ["Окунь", "Карась", "Йорж"], size: [0.2, 1.5]},
            {n: "Хліб", p: 20, target: ["Плітка", "Верховодка"], size: [0.05, 0.6]},
            {n: "Тісто", p: 35, target: ["Лящ", "Плітка"], size: [0.4, 3.0]}
        ],
        food: [{n: "Сало", p: 80, h: 50}]
    };

    // Завантаження даних
    let p = JSON.parse(localStorage.getItem('desna_final_v7')) || {
        money: 500, xp: 0, rank: 1, inv: [], hr: 12, min: 0,
        baits: { "Черв'як": 50, "Хліб": 0, "Тісто": 0 },
        selBait: "Черв'як"
    };

    let state = 'idle', pullActive = false, tension = 0, progress = 0, fishW = 0;

    // ПОВІЛЬНИЙ ЧАС (1 хв = 1 сек)
    setInterval(() => {
        p.min++;
        if(p.min >= 60) { p.min = 0; p.hr = (p.hr + 1) % 24; }
        updateUI();
    }, 1000);

    // ОСНОВНИЙ ЦИКЛ БОРОТЬБИ (10 разів на сек)
    setInterval(() => {
        if(state === 'bite') {
            if(pullActive) {
                progress += (8 / fishW);
                tension += 10;
            } else {
                tension = Math.max(0, tension - 12);
                progress = Math.max(0, progress - 0.3);
            }
            if(tension > 100) { alert("💔 ОБРИВ! Риба зірвалася."); resetGame(); }
            if(progress >= 100) catchFish();
            updateFightUI();
            updateLine();
        }
    }, 100);

    function showScreen(id) {
        // Звук кліку та музика
        document.getElementById('s-click').play();
        let bg = document.getElementById('bg-music');
        if(bg.paused) { bg.volume = 0.2; bg.play(); }

        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        
        if(id === 'shop') renderShop();
        if(id === 'backpack') renderBackpack();
        if(id === 'inv') renderInv();
    }

    function updateUI() {
        document.getElementById('money').innerText = Math.floor(p.money);
        document.getElementById('rank').innerText = p.rank;
        document.getElementById('time').innerText = `${String(p.hr).padStart(2,'0')}:${String(p.min).padStart(2,'0')}`;
        document.getElementById('cur-bait-name').innerText = p.selBait;
        document.getElementById('cur-bait-count').innerText = p.baits[p.selBait] || 0;
        localStorage.setItem('desna_final_v7', JSON.stringify(p));
    }

    function renderShop() {
        let html = GEAR_DATA.baits.map(b => `
            <div class="item-row">
                <span><b>${b.n}</b> (10 шт)<br><small>Ціна: ${b.p}₴</small></span>
                <button class="btn-small" onclick="buyBait('${b.n}', ${b.p})">КУПИТИ</button>
            </div>
        `).join('');
        document.getElementById('shop-items').innerHTML = html;
    }

    function buyBait(name, price) {
        if(p.money >= price) {
            p.money -= price;
            p.baits[name] = (p.baits[name] || 0) + 10;
            document.getElementById('s-money').play();
            updateUI();
            alert(`Куплено: ${name}`);
        } else alert("Недостатньо коштів!");
    }

    function renderBackpack() {
        let bHtml = Object.keys(p.baits).map(n => `
            <div class="item-row">
                <span>${n}: <b>${p.baits[n]}</b> шт</span>
                <button class="btn-small" onclick="setBait('${n}')" ${p.selBait===n?'disabled':''}>
                    ${p.selBait===n?'ВИБРАНО':'ВИБРАТИ'}
                </button>
            </div>
        `).join('');
        document.getElementById('inv-baits').innerHTML = bHtml;
        document.getElementById('inv-food').innerHTML = `<div style="padding:10px; font-size:0.8em; color:#888;">Продукти відсутні</div>`;
    }

    function setBait(name) {
        p.selBait = name;
        document.getElementById('s-click').play();
        renderBackpack();
        updateUI();
    }

    function updateLine() {
        const rod = document.querySelector('.rod-body');
        const bobber = document.getElementById('bobber');
        const line = document.getElementById('fishing-line');
        if (bobber.style.display === 'none') { line.style.width = '0'; return; }

        const rodR = rod.getBoundingClientRect();
        const gameR = document.getElementById('game-view').getBoundingClientRect();
        const bobR = bobber.getBoundingClientRect();

        const x1 = rodR.left + rodR.width/2 - gameR.left;
        const y1 = rodR.top - gameR.top;
        const x2 = bobR.left + bobR.width/2 - gameR.left;
        const y2 = bobR.top - gameR.top;

        const dist = Math.sqrt((x2-x1)**2 + (y2-y1)**2);
        const angle = Math.atan2(y2-y1, x2-x1);

        line.style.width = dist + "px";
        line.style.left = x1 + "px";
        line.style.top = y1 + "px";
        line.style.transform = `rotate(${angle}rad)`;
    }

    function cast(e) {
        if(state !== 'idle') return;
        if((p.baits[p.selBait] || 0) <= 0) return alert("Закінчилася наживка! Виберіть іншу в рюкзаку.");

        state = 'wait';
        p.baits[p.selBait]--;
        document.getElementById('s-cast').play();
        
        let rect = e.currentTarget.getBoundingClientRect();
        let b = document.getElementById('bobber');
        b.style.left = (e.clientX - rect.left - 5) + "px";
        b.style.top = (e.clientY - rect.top) + "px";
        b.style.display = 'block';
        document.getElementById('rod-container').style.display = 'block';
        updateLine();

        // Час до покльовки
        setTimeout(() => {
            if(state === 'wait') {
                state = 'bite';
                document.getElementById('s-bite').play();
                fishW = (Math.random() * 2.5 + 0.1).toFixed(2);
                document.getElementById('fight-ui').style.display = 'block';
                // Поплавок трохи "сіпається"
                b.style.top = (parseInt(b.style.top) + 5) + "px";
            }
        }, 1500 + Math.random()*3000);
    }

    function startPull() { pullActive = true; document.getElementById('s-reel').play(); }
    function stopPull() { pullActive = false; document.getElementById('s-reel').pause(); }

    function updateFightUI() {
        document.getElementById('p-fill').style.width = progress + "%";
        document.getElementById('t-fill').style.width = tension + "%";
        document.getElementById('rod-container').style.transform = `rotate(${-tension/4}deg)`;
    }

    function catchFish() {
        let bData = GEAR_DATA.baits.find(x => x.n === p.selBait);
        let name = bData.target[Math.floor(Math.random()*bData.target.length)];
        p.inv.push({n: name, w: fishW});
        document.getElementById('s-success').play();
        alert(`🎯 Є! ${name} на ${fishW} кг!`);
        resetGame();
    }

    function resetGame() {
        state = 'idle';
        document.getElementById('s-reel').pause();
        document.getElementById('bobber').style.display = 'none';
        document.getElementById('fight-ui').style.display = 'none';
        document.getElementById('rod-container').style.display = 'none';
        document.getElementById('fishing-line').style.width = '0';
        progress = 0; tension = 0;
        updateUI();
    }

    function sellFish() {
        if(p.inv.length === 0) return alert("Садок порожній!");
        let sum = p.inv.reduce((s, f) => s + f.w * 120, 0);
        p.money += sum;
        p.inv = [];
        document.getElementById('s-money').play();
        updateUI();
        alert(`Улов продано за ${Math.floor(sum)}₴`);
    }

    function renderInv() {
        document.getElementById('fish-list').innerHTML = p.inv.map(f => `
            <div class="item-row">🐟 ${f.n} <span>${f.w} кг</span></div>
        `).join('') || '<div style="text-align:center; padding:20px; color:#666;">Садок порожній</div>';
    }

    function exitGame() { resetGame(); showScreen('menu'); }

    // Початкове оновлення
    updateUI();
</script>
</body>
</html>
