<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Десна</title>
    <style>
        :root { --wood: #3e2723; --gold: #ffcc80; --dark: #0e1a14; --neon: #39ff14; --danger: #ff4444; }
body {
    margin: 0;
    font-family: 'Tahoma', sans-serif;
    background: #0e1a14;
    color: white;
    user-select: none;
    overflow: hidden;
    touch-action: none;
}
        
        .stats { background: var(--wood); padding: 5px 10px; display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 5px; border-bottom: 2px solid var(--gold); font-size: 0.75em; text-align: center; }
        .val { color: var(--gold); font-weight: bold; }
        .bar-container { grid-column: span 3; display: flex; gap: 10px; align-items: center; margin-top: 5px; }
        .bar-bg { flex-grow: 1; background: #111; height: 10px; border-radius: 5px; border: 1px solid #555; overflow: hidden; }
        #h-fill { height: 100%; background: #4caf50; width: 100%; transition: 0.3s; }

.screen {
    display: none;
    padding: 10px;
    text-align: center;
    height: 90vh;
    overflow-y: auto;
    background: rgba(0,0,0,0.55);
    backdrop-filter: blur(3px);
    box-sizing: border-box;
}

#menu {
    position: relative;
    background: url('Десна.jpg') center/cover no-repeat;
}

#menu::before {
    content: "";
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.45);
    pointer-events: none;
}

#menu * {
    position: relative;
    z-index: 2;
}
        .active { display: block !important; }

        .btn { background: #4e342e; color: white; border: 1.5px solid var(--gold); padding: 10px; margin: 4px auto; width: 95%; border-radius: 4px; cursor: pointer; font-size: 0.85em; font-weight: bold; text-transform: uppercase; }
        .btn-small { width: auto; padding: 5px 10px; font-size: 0.7em; background: #5d4037; border: 1px solid var(--gold); color: white; border-radius: 3px; }
        .btn:disabled { background: #222; color: #666; border-color: #444; }

        #game-view { height: 50vh; position: relative; background-size: cover; background-position: center; border-bottom: 3px solid var(--wood); overflow: hidden; background-color: #222; }
        #rod-visual { position: absolute; bottom: -20px; right: 20%; width: 10px; height: 150px; background: linear-gradient(to top, #3e2723, #5d4037); transform-origin: bottom center; transform: rotate(15deg); transition: transform 0.1s; z-index: 10; border-radius: 5px; display: none; }
        #bobber { position: absolute; display: none; z-index: 5; }
        .ant { width: 3px; height: 15px; background: red; margin: 0 auto; }
        .bod { width: 8px; height: 12px; background: white; border-radius: 50%; border: 1px solid black; }

        #fight-ui { position: absolute; top: 30%; left: 50%; transform: translate(-50%, -50%); width: 85%; background: rgba(0,0,0,0.85); padding: 12px; border: 2px solid var(--gold); display: none; z-index: 100; border-radius: 8px; }
        .f-bar { background: #111; height: 14px; border-radius: 7px; border: 1px solid #555; margin: 2px 0 8px 0; overflow: hidden; }
        
        .tabs { display: flex; overflow-x: auto; gap: 2px; margin-bottom: 10px; }
        .tab { flex: 0 0 80px; padding: 8px; background: #333; font-size: 0.7em; cursor: pointer; border: 1px solid var(--gold); color: #fff; text-align: center; }
        .tab.active-tab { background: var(--wood); font-weight: bold; color: var(--gold); }

        .item-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid #333; font-size: 0.8em; text-align: left; }
        .ach-card { background: #2d1b17; border: 1px solid #5d4037; padding: 10px; margin: 5px 0; border-radius: 4px; text-align: left; opacity: 0.4; }
        .ach-unlocked { opacity: 1; border-color: var(--gold); box-shadow: 0 0 8px var(--gold); }
        
        .inv-section { margin-bottom: 15px; border: 1px solid #444; border-radius: 5px; padding: 5px; background: #222; }
        .inv-title { font-size: 0.7em; color: var(--gold); text-transform: uppercase; margin-bottom: 5px; border-bottom: 1px solid #444; display: block; }
        #day-overlay{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
pointer-events:none;
transition: background 1s linear;
}
        #game-popup{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:#2d1b17;
border:2px solid #ffcc80;
padding:20px;
z-index:999;
display:none;
text-align:center;
border-radius:10px;
box-shadow:0 0 20px black;
}

#game-popup button{
margin-top:10px;
padding:8px 20px;
background:#4e342e;
border:1px solid #ffcc80;
color:white;
cursor:pointer;
}

#water{
position:absolute;
bottom:0;
left:0;
width:100%;
height:45%;   /* висота води */
background:rgba(0,80,150,0.15);
border-top:2px solid rgba(255,255,255,0.2);
}
    </style>
</head>
<body>

<audio id="s-cast" src="https://actions.google.com/sounds/v1/water/splash.ogg"></audio>
<audio id="s-bite" src="https://www.soundjay.com/misc/sounds/bell-ringing-05.mp3"></audio>
<audio id="s-reel" src="https://actions.google.com/sounds/v1/foley/fishing_reel_fast.ogg"></audio>

<audio id="bg-music"></audio>

 

<div class="stats">
    <div>💰 <span id="money">500</span></div>
    <div>⭐ Р-д: <span id="rank">1</span></div>
    <div>⏰ <span id="time">12:00</span></div>
    <div class="bar-container">
        <small>🍽️</small>
        <div class="bar-bg"><div id="h-fill"></div></div>
    </div>
</div>

<div id="menu" class="screen active">
    <h2 style="color:var(--gold); margin: 5px;">ДЕСНА</h2>
    <div style="margin-bottom: 10px; font-size: 0.85em; color: var(--neon); background: #000; padding: 5px; border: 1px solid #333;">
        🎣 Наживка: <span id="cur-bait-name">...</span> (<span id="cur-bait-count">0</span>)
    </div>
    <button class="btn" onclick="showScreen('locs')">➡️ НА ВОДУ</button>
    <button class="btn" onclick="showScreen('backpack')">🎒 РЮКЗАК (ІНВЕНТАР)</button>
    <button class="btn" onclick="showScreen('fishshop')">🎣 РИБАЛЬСЬКИЙ МАГАЗИН</button>
    <button class="btn" onclick="showScreen('foodshop')">🍖 ПРОДУКТОВИЙ МАГАЗИН</button>
    <button class="btn" onclick="showScreen('inv')">🧺 САДОК (УЛОВ)</button>
    <button class="btn" onclick="showScreen('achs')">🏆 ДОСЯГНЕННЯ</button>
    <button class="btn" onclick="sellFish()" style="background: #2e7d32; border-color: #81c784;">⚖️ ПРОДАТИ УЛОВ</button>
</div>

<div id="backpack" class="screen">
    <h3>🎒 ТВІЙ РЮКЗАК</h3>
    
    <div class="inv-section">
        <span class="inv-title">Наживки</span>
        <div id="inv-baits"></div>
    </div>

    <div class="inv-section">
        <span class="inv-title">Продукти</span>
        <div id="inv-food"></div>
    </div>

    <div class="inv-section">
        <span class="inv-title">Твої снасті</span>
        <div id="inv-gear"></div>
    </div>

    <button class="btn" onclick="showScreen('menu')">НАЗАД В МЕНЮ</button>
</div>
<div id="fishshop" class="screen">
<h3>🎣 РИБАЛЬСЬКИЙ МАГАЗИН</h3>

<div class="tabs">
<div class="tab active-tab" onclick="switchShop('baits')">Наживки</div>
<div class="tab" onclick="switchShop('rods')">Вудки</div>
<div class="tab" onclick="switchShop('reels')">Катушки</div>
<div class="tab" onclick="switchShop('lines')">Ліски</div>
</div>

<div id="shop-items"></div>

<button class="btn" onclick="showScreen('menu')">НАЗАД</button>
</div>

    <div id="foodshop" class="screen">

<h3>🍖 ПРОДУКТОВИЙ МАГАЗИН</h3>

<div class="tabs">
<div class="tab active-tab" onclick="switchShop('food')">Їжа</div>
<div class="tab" onclick="switchShop('alcohol')">Алкоголь</div>
</div>

<div id="shop-items"></div>

<button class="btn" onclick="showScreen('menu')">НАЗАД</button>

</div>
<div id="achs" class="screen">
    <h3>МОЇ ДОСЯГНЕННЯ</h3>
    <div id="ach-container"></div>
    <button class="btn" onclick="showScreen('menu')">НАЗАД</button>
</div>

<div id="locs" class="screen">
    <h3>КУДИ ПОЇДЕМО?</h3>
    <div id="loc-list"></div>
    <button class="btn" style="background:#333" onclick="showScreen('menu')">НАЗАД</button>
</div>

<div id="game" class="screen" style="padding:0;">
    <div id="game-view" onclick="cast(event)">
    <div id="day-overlay"></div>

    <div id="water"></div> <!-- ВОДА -->

    <div id="rod-visual"></div>
    <div id="bobber"><div class="ant"></div><div class="bod"></div></div>
        <div id="rod-visual"></div>
        <div id="bobber"><div class="ant"></div><div class="bod"></div></div>
        <div id="fight-ui">
            <b style="color:var(--neon)">КЛЮЄ! ТЯГНИ!</b>
            <div style="font-size:12px;">НАТЯГ ЛІСКИ</div>
<div class="f-bar">
    <div id="t-fill" style="width:0; background:var(--neon); height:100%;"></div>
</div>

<div style="font-size:12px;">ВИТЯГУЄШ РИБУ</div>
<div class="f-bar">
    <div id="p-fill" style="width:0; background:#2196f3; height:100%;"></div>
</div>
            <button class="btn" style="background:green" onmousedown="startPull()" onmouseup="stopPull()" ontouchstart="startPull()" ontouchend="stopPull()">ТЯГНИ 🎣</button>
        </div>
    </div>
    <button class="btn" onclick="exitGame()">В МЕНЮ</button>
</div>

<div id="inv" class="screen">
    <h3>🧺 САДОК (РИБА)</h3>
    <div id="fish-list" style="text-align: left; padding: 10px;"></div>
    <button class="btn" onclick="showScreen('menu')">НАЗАД</button>
</div>
<div id="game-popup">
    <div id="popup-text"></div>
    <button onclick="closePopup()">OK</button>
</div>
<script>

     const MUSIC = [
"Sergio Medved - 03.08.25(1).mp3",
"Sergio Medved - 04.01.26.mp3",
"Sergio Medved - 12.11.25.mp3",
"Sergio Medved - 19.10.25.mp3",
"Sergio Medved - 21.10.25.mp3",
"Sergio Medved - 22.03.26(1).mp3",
"Sergio Medved - 24.01.26(2).mp3",
"Sergio Medved - 25.10.25(1).mp3",
"Sergio Medved - 25.11.25.mp3",
"Sergio Medved - 04.11.23.mp3",
"Sergio Medved - 09.01.26.mp3",
"Sergio Medved - 25.12.25.mp3"
];
    
  const GEAR_DATA = {
    fish: [
        {n: "Плітка", min: 0.1, max: 1.5, p: 10},
        {n: "Карась", min: 0.2, max: 2.0, p: 15},
        {n: "Срібний карась", min: 0.3, max: 2.5, p: 20},
        {n: "Линь", min: 0.5, max: 3.0, p: 25},
        {n: "Линок", min: 0.4, max: 2.8, p: 20},
        {n: "Щука", min: 1.0, max: 8.0, p: 50},
        {n: "Окунь", min: 0.3, max: 1.5, p: 20},
        {n: "Йорж", min: 0.2, max: 1.2, p: 15},
        {n: "Краснопірка", min: 0.2, max: 1.0, p: 12},
        {n: "Лящ", min: 0.5, max: 4.5, p: 30},
        {n: "Короп", min: 1.0, max: 12.0, p: 50},
        {n: "Білий амур", min: 2.0, max: 12.0, p: 60},
        {n: "Сазан", min: 3.0, max: 15.0, p: 70},
        {n: "Сом", min: 5.0, max: 40.0, p: 100},
        {n: "Густера", min: 0.3, max: 2.0, p: 18},
        {n: "Уклейка", min: 0.1, max: 0.8, p: 10}
    ],

    baits: [
        {n: "Хліб", p: 20, target: ["Плітка","Карась","Срібний карась","Краснопірка","Уклейка"], size: [0.1, 1.2]},
        {n: "Черв'як", p: 50, target: ["Окунь","Йорж","Карась","Линь","Линок","Плітка","Щука"], size: [0.2, 2.5]},
        {n: "Тісто", p: 80, target: ["Лящ","Плітка","Карась","Густера","Краснопірка"], size: [0.5, 4.5]},
        {n: "Кукурудза", p: 150, target: ["Короп","Білий амур","Сазан","Лящ"], size: [2, 12]},
        {n: "Бойли", p: 300, target: ["Трофейний короп","Сом","Щука","Сазан"], size: [8, 70]}
    ],

    rods: [
        {n: "Bamboo Stick", p: 200, m: 2, r: 1},
        {n: "River Star", p: 1500, m: 10, r: 3},
        {n: "Carbon Pro", p: 5000, m: 35, r: 7},
        {n: "Titan Deep", p: 18000, m: 150, r: 12},
        {n: "Ultimate Desna", p: 60000, m: 500, r: 20}
    ],

    reels: [
        {n: "Old Wheel", p: 150, m: 1.2, r: 1},
        {n: "Spark 100", p: 1200, m: 3, r: 4},
        {n: "Sea Master", p: 5000, m: 8, r: 8},
        {n: "Turbo Reel", p: 15000, m: 25, r: 15},
        {n: "Quantum X", p: 40000, m: 60, r: 20}
    ],

    lines: [
        {n: "Mono 2kg", p: 50, m: 2, r: 1},
        {n: "Mono 10kg", p: 500, m: 10, r: 5},
        {n: "Braid 35kg", p: 1500, m: 35, r: 10},
        {n: "Heavy Line", p: 6000, m: 120, r: 15},
        {n: "Steel Wire", p: 20000, m: 450, r: 22}
    ],

    food: [
        {n:"🥖 Хліб", p:30, h:20, xp:0},
        {n:"🥓 Сало", p:120, h:60, xp:0},
        {n:"🍲 Борщ", p:180, h:70, xp:10},
        {n:"🥔 Картопля", p:60, h:25, xp:0},
        {n:"🍗 Курка", p:220, h:80, xp:20},
        {n:"🍖 Шашлик", p:300, h:90, xp:30},
        {n:"🧀 Сир", p:140, h:40, xp:5},
        {n:"🍞 Бутерброд", p:100, h:35, xp:5}
    ],

    alcohol: [
        {n:"🥃 Горілка", p:250, h:-10, xp:200},
        {n:"🍺 Пиво", p:120, h:5, xp:40},
        {n:"🍷 Вино", p:300, h:-5, xp:150},
        {n:"🥃 Самогон", p:180, h:-20, xp:250},
        {n:"🍸 Коньяк", p:600, h:-30, xp:400}
    ]
};
const ACHS = [

{ id:1,  n:"Перші кроки", d:"Підняти 2 розряд", c:(p)=>p.rank>=2, r:100 },
{ id:2,  n:"Завзятий", d:"Прожити 7 ігрових днів", c:(p)=>p.days>=7, r:150 },
{ id:3,  n:"Важка вага", d:"Впіймати рибу >5кг", c:(p)=>p.stats.maxW>=5, r:200 },
{ id:4,  n:"Майстер", d:"Впіймати 50 риб", c:(p)=>p.stats.totalF>=50, r:250 },

{ id:5,  n:"Профі", d:"Підняти 5 розряд", c:(p)=>p.rank>=5, r:400 },
{ id:6,  n:"Рибалка", d:"Впіймати 10 риб", c:(p)=>p.stats.totalF>=10, r:120 },
{ id:7,  n:"Досвідчений", d:"Впіймати 25 риб", c:(p)=>p.stats.totalF>=25, r:180 },
{ id:8,  n:"Колекціонер", d:"Впіймати 100 риб", c:(p)=>p.stats.totalF>=100, r:600 },

{ id:9,  n:"Гігант", d:"Впіймати рибу >10кг", c:(p)=>p.stats.maxW>=10, r:500 },
{ id:10, n:"Трофей", d:"Впіймати рибу >20кг", c:(p)=>p.stats.maxW>=20, r:1200 },

{ id:11, n:"Старий рибак", d:"Прожити 30 днів", c:(p)=>p.days>=30, r:700 },
{ id:12, n:"Легенда Десни", d:"Підняти 30 розряд", c:(p)=>p.rank>=10, r:1500 },

{ id:13, n:"Багатій", d:"Мати 5000₴", c:(p)=>p.money>=5000, r:1000 },
{ id:14, n:"Мільйонер", d:"Мати 20000₴", c:(p)=>p.money>=20000, r:3000 },

{ id:15, n:"Абсолютний майстер", d:"Піймати рибу >60кг", c:(p)=>p.stats.maxW>=50, r:5000 }

];

    const LOCATIONS = [
        {n: "Топольки", img: "topolki.jpg", rank: 1},
        {n: "Біля бутки", img: "butka.jpg", rank: 2},
        {n: "Біля парома", img: "parom.jpg", rank: 4},
        {n: "На холмі ", img: "Kholm.jpg", rank: 6},
        {n: "Попове", img: "popove.jpg", rank: 8},
        {n: "Сохатське", img: "sohatske.jpg", rank: 10},
        {n: "Журавльове", img: "Zhuravlove.jpg", rank: 16}
    ];

    // Ініціалізація
    let p = JSON.parse(localStorage.getItem('desna_backpack_v5')) || {
        money: 500, xp: 0, rank: 1, days: 1, inv: [], hr: 12, min: 0, hng: 100,
        gear: { rod: 0, reel: 0, line: 0 },
        ownedGear: { rods: [0], reels: [0], lines: [0] },
        baits: { "Черв'як": 50 },
        food: {},
        selBait: "Черв'як",
        stats: { totalF: 0, maxW: 0 },
        unlockedAchs: []
    };

    // Фікс для старих збережень
    if(!p.food) p.food = {};
    if(!p.ownedGear) p.ownedGear = { rods: [0], reels: [0], lines: [0] };

    let state = 'idle', pullActive = false, tension = 0, progress = 0, fishW = 0;

const TIME_SPEED = 2; // швидкість часу (можеш міняти)

setInterval(() => {

    p.min += TIME_SPEED;

    if(p.min >= 60){
        p.min = 0;
        p.hr++;
    }

    if(p.hr >= 24){
        p.hr = 0;
        p.days++;
    }

    // голод теж тут логічно
    p.hng -= 0.1;
    if(p.hng < 0) p.hng = 0;

    updateUI();
    updateDayNight();
    checkAchs();

}, 1000);

    setInterval(() => {

    if(state !== 'bite') return;

    let rodPower = GEAR_DATA.rods[p.gear.rod].m;
    let linePower = GEAR_DATA.lines[p.gear.line].m;
    let reelPower = GEAR_DATA.reels[p.gear.reel].m;

    let fishPower = fishW * 1.5;

    if(pullActive){

        let pull = rodPower / fishPower;

        progress += pull * 1.5;
        tension += fishPower / (linePower * reelPower) * 0.5;

        document.getElementById('s-reel').play();

    }
    else{

        progress -= 0.02;
        tension -= 0.3;

        document.getElementById('s-reel').pause();
    }

    progress = Math.max(0, Math.min(progress,100));
    tension = Math.max(0, tension);

    if(tension > 100){
        showPopup("💥 ОБРИВ ЛІСКИ!");
        resetGame();
    }

    if(progress >= 100){
        catchFish();
    }

    updateFightUI();

}, 100);

    function updateUI() {
        document.getElementById('money').innerText = Math.floor(p.money);
        document.getElementById('rank').innerText = p.rank;
        document.getElementById('time').innerText = `${String(p.hr).padStart(2,'0')}:${String(p.min).padStart(2,'0')}`;
        document.getElementById('h-fill').style.width = p.hng + "%";
        document.getElementById('cur-bait-name').innerText = p.selBait;
        document.getElementById('cur-bait-count').innerText = p.baits[p.selBait] || 0;
        localStorage.setItem('desna_backpack_v5', JSON.stringify(p));
    }

    function showScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        if(id === 'shop') switchShop('baits');
        if(id === 'backpack') renderBackpack();
        if(id === 'achs') renderAchs();
        if(id === 'locs') renderLocs();
        if(id === 'inv') renderInv();
    }

    function switchShop(cat) {
        let html = GEAR_DATA[cat].map((it, i) => {
            let alreadyOwned = (cat !== 'baits' && cat !== 'food' && p.ownedGear[cat].includes(i));
            return `<div class="item-row">
                <div><b>${it.n}</b><br><small>${it.p}₴ ${it.m ? `(${it.m}кг)` : ''}</small></div>
                <button onclick="buy('${cat}', ${i})" ${p.rank < (it.r||1) || alreadyOwned ? 'disabled' : ''}>
                    ${alreadyOwned ? 'КУПЛЕНО' : 'КУПИТИ'}
                </button>
            </div>`;
        }).join('');
        document.getElementById('shop-items').innerHTML = html;
    }

    function buy(cat, i) {
        let it = GEAR_DATA[cat][i];
        if(p.money < it.p) return showPopup("Мало грошей!");
        p.money -= it.p;
        
        if(cat === 'baits') { 
            p.baits[it.n] = (p.baits[it.n] || 0) + 10;
            showPopup(`Придбано 10 шт. наживки: ${it.n}`);
        } else if(cat === 'food' || cat === 'alcohol') { 
             p.food[item.n] = (p.food[item.n] || 0) + 1;
            showPopup(`У рюкзак додано: ${it.n}`);
        } else { 
            p.ownedGear[cat].push(i);
            showPopup(`Снасть ${it.n} додана в арсенал!`);
        }
        updateUI();
        switchShop(cat);
    }

    function renderBackpack() {
        // Наживки
       let baitHtml = Object.keys(p.baits).map(name => {
            return `<div class="item-row">
    <span>${name} (${p.baits[name]} шт)</span>
    <button class="btn-small" onclick="selectBait('${name}')" 
        ${(p.baits[name] <= 0 || p.selBait === name) ? 'disabled' : ''}>
        ${p.selBait === name ? 'ВИБРАНО' : 'ВИБРАТИ'}
    </button>
</div>`;
        }).join('') || 'Наживки немає';
        document.getElementById('inv-baits').innerHTML = baitHtml;

        // Їжа
        let foodHtml = Object.keys(p.food).map(name => {
            if(p.food[name] <= 0) return '';
            return `<div class="item-row">
                <span>${name} (${p.food[name]} шт)</span>
                <button class="btn-small" onclick="useFood('${name}')">З'ЇСТИ</button>
            </div>`;
        }).join('') || 'Їжі немає';
        document.getElementById('inv-food').innerHTML = foodHtml;

        // Снасті
        let gearHtml = ['rods', 'reels', 'lines'].map(type => {
            return p.ownedGear[type].map(idx => {
                let it = GEAR_DATA[type][idx];
                let isEquipped = p.gear[type.slice(0,-1)] === idx;
                return `<div class="item-row">
                    <span>${it.n} (${it.m}кг)</span>
                    <button class="btn-small" onclick="equipGear('${type}', ${idx})" ${isEquipped ? 'disabled' : ''}>
                        ${isEquipped ? 'ЕКІПІЙОВАНО' : 'ВЗЯТИ'}
                    </button>
                </div>`;
            }).join('');
        }).join('');
        document.getElementById('inv-gear').innerHTML = gearHtml;
    }

    function selectBait(name) { p.selBait = name; renderBackpack(); updateUI(); }
    
    function useFood(name) {
        let it = GEAR_DATA.food.find(f => f.n === name);
        if(p.food[name] > 0) {
            p.food[name]--;
            p.hng = Math.min(100, p.hng + it.h);
            p.xp += it.xp;
            p.rank = Math.floor(p.xp/1000)+1;
            showPopup(`Ви використали: ${name}`);
            renderBackpack();
            updateUI();
        }
    }

    function equipGear(type, idx) {
        p.gear[type.slice(0,-1)] = idx;
        renderBackpack();
        updateUI();
    }

   function cast(e){

    if(state !== 'idle') return;

    let rect = e.currentTarget.getBoundingClientRect();
    let y = e.clientY - rect.top;

    let waterStart = rect.height * 0.55; // де починається вода

    if(y < waterStart){
        showPopup("🎣 Тут немає води!");
        return;
    }

    if(!p.baits[p.selBait] || p.baits[p.selBait] <= 0)
        return showPopup("Виберіть наживку в рюкзаку!");

    if(p.hng < 5)
        return showPopup("Ти занадто голодний, щоб кидати вудку!");

    state = 'wait';
    p.baits[p.selBait]--;

    document.getElementById('s-cast').play();

    document.getElementById('bobber').style.left = (e.clientX - rect.left) + "px";
    document.getElementById('bobber').style.top = (e.clientY - rect.top) + "px";
    document.getElementById('bobber').style.display = 'block';
    document.getElementById('rod-visual').style.display = 'block';

    setTimeout(() => {

        if(state === 'wait'){

            state = 'bite';
            document.getElementById('s-bite').play();

            let bData = GEAR_DATA.baits.find(x => x.n === p.selBait);
            fishW = +(Math.random() * (bData.size[1] - bData.size[0]) + bData.size[0]).toFixed(2);

            document.getElementById('fight-ui').style.display = 'block';
        }

    }, 2000 + Math.random() * 3000);
}

    function startPull() { pullActive = true; }
    function stopPull() { pullActive = false; document.getElementById('s-reel').pause(); }
    
    function updateFightUI() {
    document.getElementById('p-fill').style.width = progress + "%";
    document.getElementById('t-fill').style.width = tension + "%";

    // натяг зелений → жовтий → червоний
    if(tension < 50){
        document.getElementById('t-fill').style.background = "lime";
    } else if(tension < 80){
        document.getElementById('t-fill').style.background = "orange";
    } else {
        document.getElementById('t-fill').style.background = "red";
    }

    let angle = 15 - tension/4;
    document.getElementById('rod-visual').style.transform = `rotate(${angle}deg)`;
}

    function catchFish() {
        let bData = GEAR_DATA.baits.find(x => x.n === p.selBait);
        let name = bData.target[Math.floor(Math.random()*bData.target.length)];
        p.inv.push({n: name, w: fishW});
        p.stats.totalF++;
        if(parseFloat(fishW) > p.stats.maxW) p.stats.maxW = parseFloat(fishW);
        p.xp += Math.floor(fishW * 40);
        p.rank = Math.floor(p.xp/1000)+1;
        showPopup(`🐟 Впіймано: ${name} (${fishW} кг)!`);
        resetGame();
    }

   let lastTrack = null;

function playRandomMusic(){

    let audio = document.getElementById("bg-music");

    let track;

    do{
        track = MUSIC[Math.floor(Math.random()*MUSIC.length)];
    }
    while(track === lastTrack);

    lastTrack = track;

    audio.src = track;

    audio.volume = 0.05;

    audio.play();
}
    document.getElementById("bg-music").addEventListener("ended", function(){
    playRandomMusic();
});
    document.body.addEventListener("click", function startMusic(){
    playRandomMusic();
    document.body.removeEventListener("click", startMusic);
});

    function spawnFish() {
    let hour = p.hr;
    let timeTag = (hour >=6 && hour <18) ? "day" : (hour >=18 && hour <22) ? "evening" : "night";

    // фільтруємо рибу за вибраною наживкою та часом доби
    let possible = FISHES.filter(f => f.bait.includes(p.selBait) && f.time.includes(timeTag));

    if(possible.length === 0) return null;

    // вибір риби по рідкості
    let total = possible.reduce((sum,f)=>sum+f.rarity,0);
    let r = Math.random()*total;
    let acc = 0;
    for(let f of possible){
        acc += f.rarity;
        if(r <= acc){
            return {...f, weight: +(Math.random()*(f.maxW-f.minW)+f.minW).toFixed(2)};
        }
    }
    return possible[0];
}
    function updateDayNight(){

let overlay = document.getElementById("day-overlay");

let h = p.hr;

if(h >= 6 && h < 18){

overlay.style.background = "rgba(0,0,0,0)";

}
else if(h >= 18 && h < 21){

overlay.style.background = "rgba(0,0,40,0.3)";

}
else if(h >= 21 || h < 5){

overlay.style.background = "rgba(0,0,80,0.55)";

}
else{

overlay.style.background = "rgba(0,0,30,0.2)";

}

}
function showPopup(text){
    document.getElementById("popup-text").innerText = text;
    document.getElementById("game-popup").style.display = "block";
}

function closePopup(){
    document.getElementById("game-popup").style.display = "none";
}
    function resetGame() { state = 'idle'; document.getElementById('bobber').style.display = 'none'; document.getElementById('fight-ui').style.display = 'none'; document.getElementById('rod-visual').style.display = 'none'; document.getElementById('s-reel').pause(); progress = 0; tension = 0; }
  function renderAchs(){

document.getElementById('ach-container').innerHTML =
ACHS.map(a =>

`<div class="ach-card ${p.unlockedAchs.includes(a.id)?'ach-unlocked':''}">
<b>${a.n}</b><br>
${a.d}<br>
💰 Нагорода: ${a.r}₴
</div>`

).join('');

}
    function checkAchs(){

ACHS.forEach(a=>{

if(!p.unlockedAchs.includes(a.id) && a.c(p)){

p.unlockedAchs.push(a.id);

p.money += a.r;

showPopup("🏆 ДОСЯГНЕННЯ: " + a.n + "\n+" + a.r + "₴");

updateUI();

}

});

}
    function renderLocs() { document.getElementById('loc-list').innerHTML = LOCATIONS.map((l, i) => `<button class="btn" onclick="p.rank>=${l.rank}?goToLoc(${i}):null" ${p.rank<l.rank?'disabled':''}>${l.n} (Р-д ${l.rank})</button>`).join(''); }
    function goToLoc(i) { document.getElementById('game-view').style.backgroundImage = `url('${LOCATIONS[i].img}')`; showScreen('game'); resetGame(); }
    function sellFish() { let sum = p.inv.reduce((a, f) => a + (f.w * 130), 0); p.money += sum; p.inv = []; updateUI(); showPopup("💰 Улов продано за "+Math.floor(sum)+"₴"); }
    function renderInv() { document.getElementById('fish-list').innerHTML = p.inv.length ? p.inv.map(f => `<div>${f.n} - ${f.w}кг</div>`).join('') : "У саду порожньо"; }
    function exitGame() { resetGame(); showScreen('menu'); }

    updateUI();
</script>
