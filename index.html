<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Десна: РР3 Ultimate Realism</title>
    <style>
        :root { --wood: #3e2723; --gold: #ffcc80; --dark: #0e1a14; --neon: #39ff14; }
        body { margin: 0; font-family: 'Tahoma', sans-serif; background: var(--dark); color: white; user-select: none; overflow: hidden; touch-action: none; }
        
        /* Статистика */
        .stats { background: var(--wood); padding: 5px 10px; display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 5px; border-bottom: 2px solid var(--gold); font-size: 0.75em; text-align: center; }
        .val { color: var(--gold); font-weight: bold; }
        .bar-bg { flex-grow: 1; background: #111; height: 10px; border-radius: 5px; border: 1px solid #555; overflow: hidden; }
        #h-fill { height: 100%; background: #4caf50; width: 100%; transition: 0.3s; }

        /* Екрани */
        .screen { display: none; padding: 10px; text-align: center; height: 90vh; overflow-y: auto; background: #1a1a1a; box-sizing: border-box; }
        .active { display: block !important; }

        /* Кнопки */
        .btn { background: #4e342e; color: white; border: 1.5px solid var(--gold); padding: 10px; margin: 4px auto; width: 95%; border-radius: 4px; cursor: pointer; font-size: 0.85em; font-weight: bold; text-transform: uppercase; }
        .btn-small { width: auto; padding: 5px 10px; font-size: 0.7em; background: #5d4037; border: 1px solid var(--gold); color: white; }

        /* Вудка та Ліска */
        #game-view { height: 50vh; position: relative; background-size: cover; background-position: center; border-bottom: 3px solid var(--wood); overflow: hidden; background-color: #222; }
        
        #rod-container { position: absolute; bottom: -10px; right: 15%; width: 100px; height: 200px; z-index: 10; display: none; pointer-events: none; transform-origin: bottom center; }
        .rod-body { position: absolute; bottom: 0; right: 50%; width: 6px; height: 180px; background: linear-gradient(to right, #222, #444, #222); border-radius: 3px; clip-path: polygon(30% 0%, 70% 0%, 100% 100%, 0% 100%); }
        .rod-reel { position: absolute; bottom: 30px; right: 38%; width: 15px; height: 15px; background: #888; border-radius: 50%; border: 2px solid #333; }
        
        #fishing-line { position: absolute; background: white; height: 1px; width: 0; transform-origin: top left; z-index: 9; pointer-events: none; opacity: 0.7; box-shadow: 0 0 2px rgba(255,255,255,0.5); }

        #bobber { position: absolute; display: none; z-index: 5; }
        .ant { width: 3px; height: 15px; background: red; margin: 0 auto; }
        .bod { width: 8px; height: 12px; background: white; border-radius: 50%; border: 1px solid black; }

        #fight-ui { position: absolute; top: 30%; left: 50%; transform: translate(-50%, -50%); width: 85%; background: rgba(0,0,0,0.85); padding: 12px; border: 2px solid var(--gold); display: none; z-index: 100; border-radius: 8px; }
        .f-bar { background: #111; height: 14px; border-radius: 7px; border: 1px solid #555; margin: 2px 0 8px 0; overflow: hidden; }

        .item-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid #333; font-size: 0.8em; text-align: left; }
        .inv-section { margin-bottom: 15px; border: 1px solid #444; padding: 5px; background: #222; }
    </style>
</head>
<body>

<audio id="s-cast" src="https://actions.google.com/sounds/v1/water/splash.ogg"></audio>
<audio id="s-bite" src="https://www.soundjay.com/misc/sounds/bell-ringing-05.mp3"></audio>
<audio id="s-reel" src="https://actions.google.com/sounds/v1/foley/fishing_reel_fast.ogg"></audio>

<div class="stats">
    <div>💰 <span id="money">500</span></div>
    <div>⭐ Р-д: <span id="rank">1</span></div>
    <div>⏰ <span id="time">12:00</span></div>
</div>

<div id="menu" class="screen active">
    <h2 style="color:var(--gold); margin: 5px;">ДЕСНА: РР3 GOLD</h2>
    <div style="margin: 10px 0; font-size: 0.85em; color: var(--neon); background: #000; padding: 8px; border: 1px solid var(--gold);">
        🎣 Наживка: <span id="cur-bait-name">...</span> (<span id="cur-bait-count">0</span> шт)
    </div>
    <button class="btn" onclick="showScreen('locs')">➡️ НА ВОДУ</button>
    <button class="btn" onclick="showScreen('backpack')">🎒 РЮКЗАК</button>
    <button class="btn" onclick="showScreen('shop')">🛒 МАГАЗИН</button>
    <button class="btn" onclick="showScreen('inv')">🧺 САДОК</button>
    <button class="btn" onclick="sellFish()">⚖️ ПРОДАТИ УЛОВ</button>
</div>

<div id="backpack" class="screen">
    <h3>🎒 ТВІЙ РЮКЗАК</h3>
    <div class="inv-section">
        <b style="color:var(--gold)">ВИБІР НАЖИВКИ:</b>
        <div id="inv-baits"></div>
    </div>
    <div class="inv-section">
        <b style="color:var(--gold)">ПРОДУКТИ:</b>
        <div id="inv-food"></div>
    </div>
    <button class="btn" onclick="showScreen('menu')">НАЗАД</button>
</div>

<div id="shop" class="screen">
    <h3>🛒 МАГАЗИН</h3>
    <div id="shop-items"></div>
    <button class="btn" onclick="showScreen('menu')">НАЗАД</button>
</div>

<div id="locs" class="screen">
    <h3>КУДИ ПОЇДЕМО?</h3>
    <div id="loc-list"></div>
    <button class="btn" onclick="showScreen('menu')">НАЗАД</button>
</div>

<div id="game" class="screen" style="padding:0;">
    <div id="game-view" onclick="cast(event)">
        <div id="fishing-line"></div>
        <div id="rod-container">
            <div class="rod-body"></div>
            <div class="rod-reel"></div>
        </div>
        <div id="bobber"><div class="ant"></div><div class="bod"></div></div>
        
        <div id="fight-ui">
            <b style="color:var(--neon)">КЛЮЄ! ТЯГНИ!</b>
            <div class="f-bar"><div id="t-fill" style="width:0; background:red; height:100%;"></div></div>
            <div class="f-bar"><div id="p-fill" style="width:0; background:#2196f3; height:100%;"></div></div>
            <button class="btn" onmousedown="startPull()" onmouseup="stopPull()" ontouchstart="startPull()" ontouchend="stopPull()">ТЯГНИ 🎣</button>
        </div>
    </div>
    <button class="btn" onclick="exitGame()">В МЕНЮ</button>
</div>

<div id="inv" class="screen">
    <h3>🧺 ТВІЙ САДОК</h3>
    <div id="fish-list"></div>
    <button class="btn" onclick="showScreen('menu')">НАЗАД</button>
</div>

<script>
    const GEAR_DATA = {
        baits: [
            {n: "Хліб", p: 20, target: ["Плітка"], size: [0.1, 0.8]},
            {n: "Черв'як", p: 50, target: ["Окунь", "Карась"], size: [0.2, 1.5]},
            {n: "Тісто", p: 30, target: ["Лящ"], size: [0.5, 2.5]}
        ],
        food: [{n: "Сало", p: 50, h: 40}]
    };

    let p = JSON.parse(localStorage.getItem('desna_v6')) || {
        money: 500, xp: 0, rank: 1, days: 1, inv: [], hr: 12, min: 0,
        baits: { "Черв'як": 50, "Хліб": 0, "Тісто": 0 },
        food: {},
        selBait: "Черв'як"
    };

    let state = 'idle', pullActive = false, tension = 0, progress = 0, fishW = 0;

    // ГОДИННИК (ПОВІЛЬНИЙ) - 1 хв = 1 сек
    setInterval(() => {
        p.min++;
        if(p.min >= 60) { p.min = 0; p.hr = (p.hr + 1) % 24; }
        updateUI();
    }, 1000);

    // Логіка боротьби
    setInterval(() => {
        if(state === 'bite') {
            if(pullActive) {
                progress += 5 / fishW;
                tension += 8;
                document.getElementById('s-reel').play();
            } else {
                tension = Math.max(0, tension - 10);
                progress = Math.max(0, progress - 0.5);
                document.getElementById('s-reel').pause();
            }
            if(tension > 100) { alert("ОБРИВ!"); resetGame(); }
            if(progress >= 100) catchFish();
            updateFightUI();
            updateLine(); // Оновлюємо ліску під час боротьби
        }
    }, 100);

    function updateUI() {
        document.getElementById('money').innerText = Math.floor(p.money);
        document.getElementById('rank').innerText = p.rank;
        document.getElementById('time').innerText = `${String(p.hr).padStart(2,'0')}:${String(p.min).padStart(2,'0')}`;
        document.getElementById('cur-bait-name').innerText = p.selBait;
        document.getElementById('cur-bait-count').innerText = p.baits[p.selBait] || 0;
        localStorage.setItem('desna_v6', JSON.stringify(p));
    }

    function showScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        if(id === 'backpack') renderBackpack();
        if(id === 'shop') renderShop();
        if(id === 'locs') renderLocs();
        if(id === 'inv') renderInv();
    }

    function renderShop() {
        let html = GEAR_DATA.baits.map(b => `
            <div class="item-row">
                <span>${b.n} (10 шт) - ${b.p}₴</span>
                <button class="btn-small" onclick="buyBait('${b.n}', ${b.p})">КУПИТИ</button>
            </div>
        `).join('');
        document.getElementById('shop-items').innerHTML = html;
    }

    function buyBait(name, price) {
        if(p.money >= price) {
            p.money -= price;
            p.baits[name] = (p.baits[name] || 0) + 10;
            updateUI();
            alert("Куплено: " + name);
        }
    }

    function renderBackpack() {
        let bHtml = Object.keys(p.baits).map(n => `
            <div class="item-row">
                <span>${n}: ${p.baits[n]} шт</span>
                <button class="btn-small" onclick="setBait('${n}')" ${p.selBait===n?'disabled':''}>
                    ${p.selBait===n?'ВИБРАНО':'ВИБРАТИ'}
                </button>
            </div>
        `).join('');
        document.getElementById('inv-baits').innerHTML = bHtml;
    }

    function setBait(name) {
        p.selBait = name;
        renderBackpack();
        updateUI();
    }

    // ЛОГІКА ЛІСКИ
    function updateLine() {
        const rod = document.querySelector('.rod-body');
        const bobber = document.getElementById('bobber');
        const line = document.getElementById('fishing-line');
        
        if (bobber.style.display === 'none') {
            line.style.width = '0';
            return;
        }

        const rodRect = rod.getBoundingClientRect();
        const gameRect = document.getElementById('game-view').getBoundingClientRect();
        const bobberRect = bobber.getBoundingClientRect();

        // Кінчик вудки (приблизно)
        const x1 = rodRect.left + rodRect.width/2 - gameRect.left;
        const y1 = rodRect.top - gameRect.top;

        // Поплавок
        const x2 = bobberRect.left + bobberRect.width/2 - gameRect.left;
        const y2 = bobberRect.top - gameRect.top;

        const dist = Math.sqrt((x2-x1)**2 + (y2-y1)**2);
        const angle = Math.atan2(y2-y1, x2-x1);

        line.style.width = dist + "px";
        line.style.left = x1 + "px";
        line.style.top = y1 + "px";
        line.style.transform = `rotate(${angle}rad)`;
    }

    function cast(e) {
        if(state !== 'idle') return;
        if(p.baits[p.selBait] <= 0) return alert("Немає наживки!");

        state = 'wait';
        p.baits[p.selBait]--;
        document.getElementById('s-cast').play();
        
        let rect = e.currentTarget.getBoundingClientRect();
        let b = document.getElementById('bobber');
        b.style.left = (e.clientX - rect.left - 4) + "px";
        b.style.top = (e.clientY - rect.top) + "px";
        b.style.display = 'block';
        document.getElementById('rod-container').style.display = 'block';
        
        updateLine();

        setTimeout(() => {
            if(state === 'wait') {
                state = 'bite';
                document.getElementById('s-bite').play();
                fishW = (Math.random() * 2 + 0.2).toFixed(2);
                document.getElementById('fight-ui').style.display = 'block';
            }
        }, 2000 + Math.random()*2000);
    }

    function startPull() { pullActive = true; }
    function stopPull() { pullActive = false; document.getElementById('s-reel').pause(); }

    function updateFightUI() {
        document.getElementById('p-fill').style.width = progress + "%";
        document.getElementById('t-fill').style.width = tension + "%";
    }

    function catchFish() {
        p.inv.push({n: "Риба", w: fishW});
        alert(`Ви впіймали рибу на ${fishW} кг!`);
        resetGame();
    }

    function resetGame() {
        state = 'idle';
        document.getElementById('bobber').style.display = 'none';
        document.getElementById('fight-ui').style.display = 'none';
        document.getElementById('rod-container').style.display = 'none';
        document.getElementById('fishing-line').style.width = '0';
        progress = 0; tension = 0;
    }

    function renderLocs() {
        document.getElementById('loc-list').innerHTML = `<button class="btn" onclick="showScreen('game')">Біля бутки</button>`;
    }

    function sellFish() {
        let money = p.inv.reduce((s, f) => s + f.w * 100, 0);
        p.money += money;
        p.inv = [];
        updateUI();
        alert("Продано на " + Math.floor(money) + "₴");
    }

    function renderInv() {
        document.getElementById('fish-list').innerHTML = p.inv.map(f => `<div>Риба - ${f.w}кг</div>`).join('') || "Порожньо";
    }

    function exitGame() { resetGame(); showScreen('menu'); }

    updateUI();
</script>
</body>
</html>
